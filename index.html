<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales POS System</title>

    <!-- Bengali Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <!-- Firebase SDKs -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js";
      import { getAuth } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-auth.js";
      import { getFirestore } from "https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDwZv2uwVv7fJNgbsdPfjX47MWmz9ixZ2w",
        authDomain: "sales-pos-system.firebaseapp.com",
        projectId: "sales-pos-system",
        storageBucket: "sales-pos-system.firebasestorage.app",
        messagingSenderId: "127188955744",
        appId: "1:127188955744:web:da053cee84c6bc252b0905",
        measurementId: "G-Q35MNPE14G"
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      window.firebaseAuth = getAuth(app);
      window.firebaseDb = getFirestore(app);
      console.log("Firebase Initialized for Web");
    </script>

    <script src="skiko.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #F8F9FA;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
        }
        #composeApp {
            width: 100%;
            height: 100%;
        }
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader" class="loader-container">
        <div class="loader"></div>
        <p>Connecting to Cloud...</p>
    </div>

    <canvas id="composeApp"></canvas>
    <script src="composeApp.js"></script>

    <script>
        window.onload = function() {
            setTimeout(function() {
                var loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }, 2000);
        };
    </script>
</body>
</html>
